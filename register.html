<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MyBusiness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body text-center">
            <h3 class="mb-4">Create an Account</h3>
            <p>Sign up to access the admin panel and manage content.</p>
            <button id="registerTrigger" class="btn btn-primary btn-lg w-100">Sign Up with Netlify Identity</button>
            <p class="mt-3"><a href="index.html">← Back to Home</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.netlifyIdentity && window.netlifyIdentity.on("init", user => {
      if (user) {
        window.location.href = "/admin/";
      } else {
        document.getElementById('registerTrigger').addEventListener('click', () => {
          window.netlifyIdentity.open('signup');
        });
        window.netlifyIdentity.on("login", () => {
          window.location.href = "/admin/";
        });
      }
    });
  </script>
</body>
</html>
