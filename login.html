<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MyBusiness</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body text-center">
            <h3 class="mb-4">Login to Admin Panel</h3>
            <p>Click the button below to sign in with Netlify Identity.</p>
            <button id="loginTrigger" class="btn btn-primary btn-lg w-100">Login with Netlify Identity</button>
            <p class="mt-3"><a href="index.html">← Back to Home</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.netlifyIdentity && window.netlifyIdentity.on("init", user => {
      if (user) {
        window.location.href = "/admin/";
      } else {
        document.getElementById('loginTrigger').addEventListener('click', () => {
          window.netlifyIdentity.open('login');
        });
        window.netlifyIdentity.on("login", () => {
          window.location.href = "/admin/";
        });
      }
    });
    // Auto-open login modal on page load (optional)
    // setTimeout(() => window.netlifyIdentity.open('login'), 500);
  </script>
</body>
</html>
